<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Mobile</title>
    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 10px;
            font-size: 14px;
        }
        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 14px 22px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin: 10px 0;
            cursor: pointer;
        }
        #log {
            background: #111;
            border: 1px solid #0f0;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 200px;
        }
        video { width: 100%; max-width: 320px; background: #333; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<h1>🔧 Teste de Diagnóstico</h1>

<div id="log">Carregando...</div>

<button onclick="testCamera()">📷 Testar Câmera</button>
<button onclick="testCDN()">🌐 Testar CDN A-Frame</button>

<video id="video" autoplay playsinline muted></video>

<script>
    const logEl = document.getElementById('log');
    const lines = [];
    function log(msg) {
        const t = new Date().toTimeString().slice(0,8);
        lines.push('[' + t + '] ' + msg);
        logEl.textContent = lines.join('\n');
    }

    /* Teste 1: JS está rodando */
    log('✓ JavaScript funcionando');
    log('UA: ' + navigator.userAgent);
    log('Protocolo: ' + location.protocol);
    log('Host: ' + location.host);
    log('mediaDevices: ' + (navigator.mediaDevices ? 'sim' : 'NÃO'));
    log('getUserMedia: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'sim' : 'NÃO'));
    log('---');
    log('Toque nos botões abaixo:');

    /* Captura erros */
    window.addEventListener('error', e => log('❌ ERRO: ' + e.message));

    function testCamera() {
        log('---');
        log('Pedindo câmera...');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
            .then(stream => {
                log('✓ CÂMERA OK!');
                const track = stream.getVideoTracks()[0];
                log('Device: ' + track.label);
                const settings = track.getSettings();
                log('Resolução: ' + settings.width + 'x' + settings.height);
                document.getElementById('video').srcObject = stream;
            })
            .catch(err => {
                log('❌ ERRO CÂMERA: ' + err.name);
                log('Mensagem: ' + err.message);
            });
    }

    function testCDN() {
        log('---');
        log('Testando CDN A-Frame...');
        const s = document.createElement('script');
        s.src = 'https://aframe.io/releases/1.3.0/aframe.min.js';
        s.onload = () => log('✓ A-Frame CDN carregou! v' + (window.AFRAME ? AFRAME.version : '?'));
        s.onerror = () => log('❌ A-Frame CDN BLOQUEADO');
        document.head.appendChild(s);

        const s2 = document.createElement('script');
        s2.src = 'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js';
        s2.onload = () => log('✓ AR.js CDN carregou!');
        s2.onerror = () => log('❌ AR.js CDN BLOQUEADO');
        document.head.appendChild(s2);
    }
</script>

</body>
</html>
